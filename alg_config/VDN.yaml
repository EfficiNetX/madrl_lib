arguments:
  # ===============================================
  # --- 1. アルゴリズム挙動 (固定: 変更不可) ---
  # ===============================================。
  
  share_observation:
    type: bool
    default: true
    readonly: true # 読み取り専用
    help: "(VDN-Fixed) CTDEのため観測を共有"
    
  use_centralized_V:
    type: bool
    default: true
    readonly: true # 読み取り専用
    help: "(VDN-Fixed) CTDEのため中央集権Criticを使用"

  share_policy:
    type: bool
    default: true
    readonly: true # 読み取り専用
    help: "(VDN-Fixed) ポリシーを共有"

  # ===============================================
  # --- 2. 調整可能なハイパーパラメータ ---
  # ===============================================

  # --- ネットワーク & アーキテクチャ ---
  hidden_size:
    type: int
    default: 256
    help: "エージェント毎のRNN(Q)ネットワークの隠れ層次元"

  layer_N:
    type: int
    default: 3
    help: "MLPBaseの追加層数（入力層の後に続く隠れ層の数）"

  recurrent_N:
    type: int
    default: 5
    help: "RNNLayerのGRU層の数"

  use_ReLU:
    type: bool
    default: true
    help: "活性化関数にReLUを使う (Falseでtanh)"

  # --- オプティマイザ & 学習率 ---
  lr:
    type: float
    default: 5e-4
    help: "学習率 (Q-Network)"
  opti_eps:
    type: float
    default: 5e-4
    help: "RMSprop optimizer epsilon"
  weight_decay:
    type: float
    default: 0
    help: "重み減衰"

  # --- 損失 & 報酬シグナル ---
  gamma:
    type: float
    default: 0.99
    help: "割引率"

  # --- リプレイバッファ & バッチ ---
  buffer_size:
    type: int
    default: 2048
    help: "リプレイバッファの最大エピソード数"
  batch_size:
    type: int
    default: 256
    help: "学習時にサンプリングするエピソード数"
  target_network_update_interval:
    type: int
    default: 100
    help: "ターゲットネットワークの更新間隔（学習回数）"

  # --- ε-greedy 探索 ---
  epsilon_start:
    type: float
    default: 1.0
    help: "ε-greedy探索の初期値"
  epsilon_final:
    type: float
    default: 0.05
    help: "ε-greedy探索の最終値"
  epsilon_anneal_ratio:
    type: float
    default: 0.9
    help: "epsilon_startからepsilon_finalまで減衰するのにかかるステップ数 / num_env_stepsの割合"

  # ===============================================
  # --- 3. 安定化テクニック (調整可能) ---
  # ===============================================
    
  use_orthogonal:
    type: bool
    default: true
    help: "重みの直交初期化を使う"
    
  use_feature_normalization:
    type: bool
    default: true
    help: "入力特徴量 (観測) の正規化 (LayerNorm) を使う"
  
  use_max_grad_norm:
    type: bool
    default: true
    help: "勾配クリッピングを有効にする"

  max_grad_norm:
    type: float
    default: 1.0
    help: "勾配クリッピングの最大値"

  gain:
    type: float
    default: 0.01
    help: "出力層の初期化ゲイン"