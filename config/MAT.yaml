arguments:
  share_observation: {type: bool, default: true, help: "centralized_Vを計算するかどうか"}
  share_policy: {type: bool, default: false, help: "Whether to use the same policy for all agents"}
  use_centralized_V: {type: bool, default: true, help: "Whether to use centralized V function"}
  hidden_size: {type: int, default: 64, help: "Dimension of hidden layers"}
  use_popart: {type: bool, default: false, help: "by default False, use PopArt"}
  use_valuenorm: {type: bool, default: true, help: "by default True, use ValueNorm"}
  use_orthogonal: {type: bool, default: true, help: "by default True, use Orthogonal"}
  use_feature_normalization: {type: bool, default: true, help: "by default True, use feature_normalization"}
  use_ReLU: {type: bool, default: true, help: "by default True, use ReLU"}
  layer_N: {type: int, default: 1, help: "Number of layers"}
  gain: {type: float, default: 0.01, help: "The gain of last action layer"}
  recurrent_N: {type: int, default: 3, help: "The number of recurrent layers"}
  use_recurrent_policy: {type: bool, default: true, help: "use a recurrent policy"}
  use_naive_recurrent_policy: {type: bool, default: false, help: "Whether to use a naive recurrent policy"}
  data_chunk_length: {type: int, default: 10, help: "Time length of chunks"}
  lr: {type: float, default: 5e-5, help: "learning rate"}
  critic_lr: {type: float, default: 5e-4, help: "critic learning rate"}
  opti_eps: {type: float, default: 1e-5, help: "optimizer epsilon"}
  weight_decay: {type: float, default: 0, help: "weight decay"}
  ppo_epoch: {type: int, default: 15, help: "number of ppo epochs"}
  use_clipped_value_loss: {type: bool, default: true, help: "by default, clip loss value"}
  clip_param: {type: float, default: 0.2, help: "ppo clip parameter"}
  num_mini_batch: {type: int, default: 1, help: "number of batches for ppo"}
  entropy_coef: {type: float, default: 0.01, help: "entropy term coefficient"}
  value_loss_coef: {type: float, default: 1, help: "value loss coefficient"}
  use_max_grad_norm: {type: bool, default: true, help: "by default, use max norm of gradients"}
  max_grad_norm: {type: float, default: 10.0, help: "max norm of gradients"}
  gamma: {type: float, default: 0.99, help: "discount factor"}
  use_gae: {type: bool, default: true, help: "use generalized advantage estimation"}
  gae_lambda: {type: float, default: 0.95, help: "gae lambda parameter"}
  use_huber_loss: {type: bool, default: true, help: "by default, use huber loss"}
  use_value_active_masks: {type: bool, default: true, help: "whether to mask useless data in value loss"}
  use_policy_active_masks: {type: bool, default: true, help: "whether to mask useless data in policy loss"}
  huber_delta: {type: float, default: 10.0, help: "coefficience of huber loss"}
  use_linear_lr_decay: {type: bool, default: false, help: "use a linear schedule on the learning rate"}
  num_block: {type: int, default: 1, help: "Number of transformer blocks"}
  num_embd: {type: int, default: 64, help: "Dimension of embedding"}
  num_head: {type: int, default: 1, help: "Number of attention heads"}