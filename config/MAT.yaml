arguments:
  # ===============================================
  # --- 1. アルゴリズム挙動 (固定: 変更不可) ---
  # ===============================================

  # なし

  # ===============================================
  # --- 2. ネットワーク基本構造 (調整可能) ---
  # ===============================================

  share_observation:
    type: bool
    default: true
    help: "Critic学習時に観測を共有するかどうか"
    
  use_centralized_V:
    type: bool
    default: true
    help: "中央集権Criticを使用するかどうか"

  share_policy:
    type: bool
    default: true 
    help: "エージェント間でポリシー(Actor)の重みを共有するか"

  hidden_size:
    type: int
    default: 64
    help: "MLP隠れ層の次元 (TransformerのFFNなどで使用)"
  
  layer_N:
    type: int
    default: 1
    help: "MLPの層の数 (RNNの手前)"
  
  gain:
    type: float
    default: 0.01
    help: "Actor最終層の重み初期化ゲイン"
  
  use_ReLU:
    type: bool
    default: true # Trueで有効 (store_false)
    help: "活性化関数にReLUを使う (Falseでtanh)"

  # ===============================================
  # --- 3. Transformer 固有設定 (調整可能) ---
  # ===============================================

  num_block:
    type: int
    default: 1
    help: "Transformerブロックの数"
  
  num_embd:
    type: int
    default: 64
    help: "Transformerの埋め込み次元 (d_model)"
    
  num_head:
    type: int
    default: 1
    help: "Transformerのヘッド数"

  # ===============================================
  # --- 4. リカレント (RNN) 設定 (調整可能) ---
  # ===============================================

  use_recurrent_policy:
    type: bool
    default: true # Trueで有効 (store_false)
    help: "リカレントポリシー(RNN)を使う"

  recurrent_N:
    type: int
    default: 3
    help: "RNN層のスタック数 (深さ)"

  use_naive_recurrent_policy:
    type: bool
    default: false # Falseで無効 (store_true)
    help: "Naive RNN (シンプルなRNN実装) を使うか"

  data_chunk_length:
    type: int
    default: 10
    help: "RNN訓練時のチャンク長 (BPTTの長さ)"

  # ===============================================
  # --- 5. オプティマイザ & 学習率 (調整可能) ---
  # ===============================================

  lr:
    type: float
    default: 5e-5
    help: "Actor (Policy) の学習率"
  
  critic_lr:
    type: float
    default: 5e-4
    help: "Critic (Value) の学習率"
  
  opti_eps:
    type: float
    default: 1e-5
    help: "Adam/RMSprop optimizerのepsilon"
  
  weight_decay:
    type: float
    default: 0
    help: "重み減衰 (L2正則化)"
  
  use_linear_lr_decay:
    type: bool
    default: false # Falseで無効 (store_true)
    help: "学習率を線形に減衰させる"

  # ===============================================
  # --- 6. PPO 固有パラメータ (調整可能) ---
  # ===============================================

  ppo_epoch:
    type: int
    default: 15
    help: "1回のイテレーションでPPOの更新を行うエポック数"
  
  clip_param:
    type: float
    default: 0.2
    help: "PPOのクリッピング係数 (epsilon)"
    
  num_mini_batch:
    type: int
    default: 1
    help: "PPO更新時のミニバッチ数"
  
  entropy_coef:
    type: float
    default: 0.01
    help: "エントロピー正則化の係数"
  
  value_loss_coef:
    type: float
    default: 1
    help: "Value (Critic) 損失の係数"

  use_clipped_value_loss:
    type: bool
    default: true # Trueで有効 (store_false)
    help: "Value損失もPPO同様にクリッピングする"

  # ===============================================
  # --- 7. 報酬 & 価値計算 (GAE) (調整可能) ---
  # ===============================================

  gamma:
    type: float
    default: 0.99
    help: "割引率"
    
  use_gae:
    type: bool
    default: true # Trueで有効 (store_false)
    help: "GAE (一般化アドバンテージ推定) を使う"
    
  gae_lambda:
    type: float
    default: 0.95
    help: "GAEのラムダ"

  # ===============================================
  # --- 8. 安定化テクニック & 損失 (調整可能) ---
  # ===============================================

  use_popart:
    type: bool
    default: false # Falseで無効 (store_true)
    help: "PopArt (報酬正規化) を使う"
    
  use_valuenorm:
    type: bool
    default: true # Trueで有効 (store_false)
    help: "ValueNorm (報酬正規化) を使う"
    
  use_orthogonal:
    type: bool
    default: true # Trueで有効 (store_false)
    help: "重みの直交初期化を使う"
    
  use_feature_normalization:
    type: bool
    default: true # Trueで有効 (store_false)
    help: "入力特徴量 (観測) の正規化 (LayerNorm) を使う"

  use_huber_loss:
    type: bool
    default: true # Trueで有効 (store_false)
    help: "Value損失にHuber損失を使う"
  
  huber_delta:
    type: float
    default: 10.0
    help: "Huber損失のデルタ値"

  use_max_grad_norm:
    type: bool
    default: true # Trueで有効 (store_false)
    help: "勾配クリッピングを有効にする"
    
  max_grad_norm:
    type: float
    default: 10.0
    help: "勾配クリッピングの最大値"

  # ===============================================
  # --- 9. マスク (エピソード完了処理) (調整可能) ---
  # ===============================================

  use_value_active_masks:
    type: bool
    default: true # Trueで有効 (store_false)
    help: "エピソード完了後のValue損失をマスクする"
    
  use_policy_active_masks:
    type: bool
    default: true # Trueで有効 (store_false)
    help: "エピソード完了後のPolicy損失をマスクする"