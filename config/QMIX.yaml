arguments:
  # --- アルゴリズム挙動 (固定) ---
  share_observation:
    type: bool
    default: true
    readonly: true
    help: "(QMIX-Fixed) CTDEのため観測を共有"
  use_centralized_V:
    type: bool
    default: true
    readonly: true
    help: "(QMIX-Fixed) CTDEのため中央集権Criticを使用"
  share_policy:
    type: bool
    default: true # QMIX/VDNはポリシー共通が一般的なため
    readonly: true
    help: "(QMIX-Fixed) ポリシーを共有"
    
  # --- 調整可能なハイパーパラメータ ---
  hidden_size: {type: int, default: 64, help: "Dimension of QMixer networks"}
  lr: {type: float, default: 5e-5, help: "learning rate"}
  critic_lr: {type: float, default: 5e-4, help: "critic learning rate"}
  opti_eps: {type: float, default: 1e-5, help: "optimizer epsilon"}
  weight_decay: {type: float, default: 0, help: "weight decay"}
  use_max_grad_norm: {type: bool, default: true, help: "by default, use max norm of gradients"}
  max_grad_norm: {type: float, default: 10.0, help: "max norm of gradients"}
  gamma: {type: float, default: 0.99, help: "discount factor"}
  huber_delta: {type: float, default: 10.0, help: "coefficience of huber loss"}
  buffer_size: {type: int, default: 10000, help: "QMIX、VDN用: リプレイバッファの最大エピソード数"}
  batch_size: {type: int, default: 512, help: "QMIX用: 学習時にサンプリングするエピソード数"}
  target_network_update_interval: {type: int, default: 2000, help: "QMIX用: ターゲットネットワークの更新間隔（学習回数）"}
  epsilon_start: {type: float, default: 1.0, help: "QMIX用: ε-greedy探索の初期値"}
  epsilon_final: {type: float, default: 0.05, help: "QMIX用: ε-greedy探索の最終値"}
  epsilon_anneal_time: {type: int, default: 800000, help: "QMIX用: εを減衰させるステップ数"}
  mixer_embed_dim: {type: int, default: 32, help: "QMIX用: Mixerネットワークの埋め込み次元"}
  hypernet_layers: {type: int, default: 2, help: "QMIX用: ハイパーネットワークの層数.1か2を指定"}
  hypernet_embed_dim: {type: int, default: 32, help: "QMIX用: ハイパーネットワークの埋め込み次元"}